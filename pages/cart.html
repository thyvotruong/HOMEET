<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng của tôi - Homeet</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/bootstrap.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/home.css">
    <link rel="stylesheet" href="../css/global-layout.css">
    
    <style>
        body { font-family: 'Noto Serif', serif; background-color: #FEF8F4; }
        .cart-page-title { color: #182B3F; font-weight: 700; }
        .cart-item-card { background: #fff; border-radius: 12px; border: 1px solid #e9ecef; transition: all 0.3s ease; }
        .cart-item-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .cart-img { width: 140px; height: 100px; object-fit: cover; border-radius: 8px; }
        .btn-custom-navy { background-color: #182B3F; color: #fff; border-radius: 30px; }
        .btn-custom-navy:hover { background-color: #0f1d2c; color: #fff; }
        .price-text { color: #dc3545; font-weight: 700; }
    </style>
</head>
<body>

    <header class="site-header sticky-top" data-include="header.html"></header>

    <main class="container py-5" style="min-height: 70vh;">
        <h1 class="cart-page-title mb-4"><i class="bi bi-bag-check me-2"></i>Giỏ hàng đặt phòng</h1>
        
        <div class="row g-4">
            <!-- Cột trái: Danh sách phòng trong giỏ hàng -->
            <div class="col-lg-8">
                <div id="cart-container" class="d-flex flex-column gap-3">
                    <!-- Dữ liệu đổ từ JavaScript -->
                </div>
            </div>

            <!-- Cột phải: Tổng kết hóa đơn -->
            <div class="col-lg-4">
                <div class="card p-4 shadow-sm border-0 rounded-4">
                    <h4 class="fw-bold mb-3" style="color: #182B3F;">Tóm tắt đơn hàng</h4>
                    <hr>
                    <div class="d-flex justify-content-between mb-2">
                        <span>Số lượng phòng:</span>
                        <span id="summary-count" class="fw-bold">0</span>
                    </div>
                    <div class="d-flex justify-content-between mb-4">
                        <span class="fs-5 fw-bold">Tạm tính:</span>
                        <span id="summary-total" class="fs-4 price-text">0 VNĐ</span>
                    </div>
                    <button id="btn-checkout-all" class="btn btn-custom-navy w-100 py-2.5 fw-bold">
                        Tiến hành đặt toàn bộ
                    </button>
                    <a href="room-detail.html" class="btn btn-outline-secondary w-100 mt-2 rounded-pill small">Tiếp tục tìm phòng</a>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer" data-include="footer.html"></footer>

    <script src="../js/load-layout.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
       
        const roomsDB = {
            // Key chữ thường dùng ở trang chi tiết
            "nghinh-phong": { title: "Nghinh Phong", priceRaw: 990000, imgShort: "rooms/nghinh-phong-main.jpg" },
            "hoa-vang": { title: "Hoa Vàng", priceRaw: 1590000, imgShort: "room-hoa-vang.jpg" },
            "vung-ro": { title: "Vũng Rô", priceRaw: 2390000, imgShort: "rooms/vungro-main.jpg" },
            "mui-dien": { title: "Mũi Điện", priceRaw: 2390000, imgShort: "room-mui-dien.jpg" },

            // THÊM: Key dạng số ID để đồng bộ với nút "Thêm vào giỏ hàng" từ room-detail.html
            "1": { title: "Nghinh Phong", priceRaw: 990000, imgShort: "rooms/nghinh-phong-main.jpg" },
            "2": { title: "Hoa Vàng", priceRaw: 1590000, imgShort: "room-hoa-vang.jpg" },
            "3": { title: "Vũng Rô", priceRaw: 2390000, imgShort: "rooms/vungro-main.jpg" },
            "4": { title: "Mũi Điện", priceRaw: 2390000, imgShort: "room-mui-dien.jpg" }
        };

        function renderCart() {
            const cart = JSON.parse(localStorage.getItem('myCart')) || [];
            const container = document.getElementById('cart-container');
            
            // --- ĐỒNG BỘ ÉP SỐ LƯỢNG LÊN BADGE HEADER KHI KHỞI CHẠY ---
            const headerBadge = document.querySelector('.site-header .badge');
            if (headerBadge) {
                headerBadge.textContent = cart.length;
                if (cart.length === 0) {
                    headerBadge.style.setProperty('display', 'none', 'important');
                    headerBadge.classList.add('d-none');
                } else {
                    headerBadge.style.setProperty('display', 'inline-block', 'important');
                    headerBadge.classList.remove('d-none');
                }
            }
            // ---------------------------------------------------------
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-5 bg-white border rounded-4 shadow-sm">
                        <i class="bi bi-cart-x fs-1 text-muted d-block mb-3"></i>
                        <p class="text-muted mb-0">Giỏ hàng của bạn đang trống.</p>
                    </div>`;
                document.getElementById('summary-count').textContent = '0';
                document.getElementById('summary-total').textContent = '0 VNĐ';
                return;
            }

            container.innerHTML = '';
            let finalTotal = 0;

            cart.forEach((item, index) => {
                const room = roomsDB[item.roomKey];
                if (!room) return;

                const date1 = new Date(item.checkIn);
                const date2 = new Date(item.checkOut);
                const diffTime = Math.abs(date2 - date1);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) || 1;
                
                const itemTotal = room.priceRaw * diffDays;
                finalTotal += itemTotal;

                const fullImgPath = "../images/" + room.imgShort;

                const cardHtml = `
                    <div class="cart-item-card p-3 shadow-sm d-flex align-items-center flex-wrap flex-sm-nowrap gap-3">
                        <img src="${fullImgPath}" alt="${room.title}" class="cart-img">
                        <div class="flex-grow-1">
                            <h5 class="fw-bold mb-1" style="color: #182B3F;">Phòng ${room.title}</h5>
                            <div class="d-flex flex-wrap gap-2 my-2 align-items-center">
                                <div class="small text-muted">Từ: <input type="date" value="${item.checkIn}" class="form-control form-control-sm d-inline-block w-auto py-0 px-1" onchange="updateItemDate(${index}, 'checkIn', this.value)"></div>
                                <div class="small text-muted">Đến: <input type="date" value="${item.checkOut}" class="form-control form-control-sm d-inline-block w-auto py-0 px-1" onchange="updateItemDate(${index}, 'checkOut', this.value)"></div>
                            </div>
                            <div class="small text-secondary">Thời gian ở: <span class="badge bg-secondary">${diffDays} đêm</span></div>
                        </div>
                        <div class="text-end ms-auto">
                            <div class="price-text fs-5 mb-2">${itemTotal.toLocaleString('vi-VN')} VNĐ</div>
                            <button class="btn btn-sm btn-outline-danger border-0" onclick="removeFromCart(${index})" title="Xóa khỏi giỏ hàng">
                                <i class="bi bi-trash fs-5"></i>
                            </button>
                        </div>
                    </div>`;
                container.insertAdjacentHTML('beforeend', cardHtml);
            });

            document.getElementById('summary-count').textContent = cart.length;
            document.getElementById('summary-total').textContent = finalTotal.toLocaleString('vi-VN') + ' VNĐ';
        }

        window.updateItemDate = function(index, key, value) {
            let cart = JSON.parse(localStorage.getItem('myCart')) || [];
            cart[index][key] = value;
            localStorage.setItem('myCart', JSON.stringify(cart));
            renderCart();
        };

        window.removeFromCart = function(index) {
            let cart = JSON.parse(localStorage.getItem('myCart')) || [];
            cart.splice(index, 1);
            localStorage.setItem('myCart', JSON.stringify(cart));
            renderCart();
            window.dispatchEvent(new Event('cartUpdated')); 
        };

        document.getElementById('btn-checkout-all').addEventListener('click', function() {
            const cart = JSON.parse(localStorage.getItem('myCart')) || [];
            if (cart.length === 0) {
                alert('Giỏ hàng của bạn đang trống.');
                return;
            }

            const firstItem = cart[0];
            const roomData = roomsDB[firstItem.roomKey];

            if (roomData) {
                const paymentUrl = `payment.html?room=${firstItem.roomKey}&price=${roomData.priceRaw}&img=${encodeURIComponent(roomData.imgShort)}`;
                sessionStorage.setItem('preferred_checkin', firstItem.checkIn);
                sessionStorage.setItem('preferred_checkout', firstItem.checkOut);
                sessionStorage.setItem('preferred_guests', firstItem.guests || 2);

                alert('Hệ thống đang chuyển hướng bạn sang cổng thanh toán đơn hàng!');
                window.location.href = paymentUrl;
            }
        });

        // Kích hoạt hiển thị cấu trúc cơ bản
        document.addEventListener('DOMContentLoaded', renderCart);

        // Đảm bảo ép lại dữ liệu chính xác sau khi load-layout.js hoàn thành việc nạp Header bất đồng bộ
        window.addEventListener('load', function() {
            setTimeout(renderCart, 200);
        });

        // Lắng nghe sự kiện đồng bộ khi xóa item
        window.addEventListener('cartUpdated', renderCart);
    </script>
</body>
</html>
