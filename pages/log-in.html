<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Homeet</title>

    <!-- Google Fonts đồng bộ dự án -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Work+Sans:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="../css/bootstrap.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/home.css">
    <link rel="stylesheet" href="../css/log-in.css">
</head>
<body>

    <!-- Navigation (Tải động từ file dùng chung) -->
    <header class="site-header sticky-top" data-include="header.html"></header>

    <main class="login-page-wrapper py-5">
        <div class="container">
            <div class="login-card mx-auto shadow-sm">
                <h2 class="login-title text-center">Chào mừng bạn đến với Homeet</h2>
                <p class="login-subtitle text-center">Đăng nhập hoặc đăng ký để trải nghiệm kỳ nghỉ tuyệt vời</p>

                <!-- Các nút đăng nhập bên thứ 3 (Giống hệt frame mẫu của bạn) -->
                <div class="social-login-group">
                    <button type="button" class="btn btn-social btn-google btn-social-trigger">
                        <img src="https://developers.google.com/static/identity/images/g-logo.png" alt="Google Logo">
                        <span>Sign in with Google</span>
                    </button>
                    
                    <button type="button" class="btn btn-social btn-facebook btn-social-trigger">
                        <i class="bi bi-facebook"></i>
                        <span>Sign in with Facebook</span>
                    </button>
                    
                    <button type="button" class="btn btn-social btn-apple btn-social-trigger">
                        <i class="bi bi-apple"></i>
                        <span>Sign in with Apple</span>
                    </button>
                </div>

                <div class="login-divider">
                    <span>hoặc</span>
                </div>

                <!-- Form Nhập Email hoặc Số điện thoại -->
                <form class="login-form" action="#" method="POST">
                    <div class="input-floating-group">
                        <input type="text" id="loginId" name="loginId" required placeholder=" ">
                        <label for="loginId">Email hoặc Số điện thoại</label>
                    </div>

                    <button type="submit" class="btn btn-continue btn-custom-navy w-100">
                        Tiếp tục
                    </button>
                </form>

                <p class="login-footer-text text-center mt-4">
                    Bằng việc tiếp tục, bạn đồng ý với <a href="policy.html">Điều khoản dịch vụ</a> và <a href="policy.html#bao-mat">Chính sách bảo mật</a> của Homeet.
                </p>
            </div>
        </div>
    </main>

    <!-- Footer (Tải động từ file dùng chung) -->
    <footer class="site-footer" data-include="footer.html"></footer>

    <!-- Các file Script điều hướng và Bootstrap -->
    <script src="../js/load-layout.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Script giả lập đăng nhập dành cho Front-end -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            // Hàm xử lý kích hoạt trạng thái đăng nhập
            function handleFakeLogin() {
                localStorage.setItem('isLoggedIn', 'true'); // Lưu trạng thái
                window.location.href = '../index.html'; // Điều hướng về Trang chủ
            }

            // 1. Kích hoạt khi Submit form nhập Email/SĐT
            const loginForm = document.querySelector('.login-form');
            if (loginForm) {
                loginForm.addEventListener('submit', function (e) {
                    e.preventDefault(); // Chặn reload trang mặc định
                    handleFakeLogin();
                });
            }

            // 2. Kích hoạt khi bấm vào các nút Mạng xã hội (Google, Facebook, Apple) để test nhanh
            const socialButtons = document.querySelectorAll('.btn-social-trigger');
            socialButtons.forEach(btn => {
                btn.addEventListener('click', function () {
                    handleFakeLogin();
                });
            });
        });
    </script>
</body>
</html>
