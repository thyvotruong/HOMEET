<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Đơn Đặt Phòng - Homeet Admin</title>
    <link rel="stylesheet" href="../css/bootstrap.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/admin-style.css">
</head>
<body>
    <div class="admin-wrapper">
        <div id="sidebar-container"></div>
        <main class="admin-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold text-dark mb-0">Danh sách đơn đặt phòng</h2>
                
                <!-- Thanh tra cứu mã đặt phòng -->
                <div class="d-flex gap-2" style="max-width: 350px; width: 100%;">
                    <input type="text" id="search-input" class="form-control" placeholder="Nhập mã đặt phòng (Ví dụ: 7492)...">
                    <button id="btn-search" class="btn btn-primary"><i class="bi bi-search"></i></button>
                </div>
            </div>

            <!-- Bảng dữ liệu đơn hàng -->
            <div class="card shadow-sm border-0 p-4">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Mã đơn</th>
                                <th>Khách hàng</th>
                                <th>Phòng</th>
                                <th>Lịch trình</th>
                                <th>Tổng tiền</th>
                                <th>Trạng thái</th>
                                <th class="text-center">Hành động cập nhật lịch</th>
                            </tr>
                        </thead>
                        <tbody id="booking-table-body">
                            <!-- JS tự động render dữ liệu và xử lý tìm kiếm ở đây -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script src="../js/backend-service.js"></script>
    <script src="js/admin-shared.js"></script>
    <script src="js/bookings.js"></script>
</body>
</html>
